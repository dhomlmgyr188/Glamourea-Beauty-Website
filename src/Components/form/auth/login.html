{{#> components-container title="login"}}

<form action="#" method="post" class="c-form c-form--login">
    <label for="email" class="c-label">الايميل </label>
    <input type="email" name="email" id="email" placeholder="ضع ايميل">
    <label for="password" class="c-label">الباسود </label>
    <input type="password" name="password" id="password" placeholder="ضع كلمة السر">
    <button type="submit">تسجيل الدخول</button>
</form>

{{/components-container}}
